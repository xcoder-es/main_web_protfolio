name: Staging sync

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review, labeled, unlabeled]
    branches:
      - main

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: staging-sync-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  sync-staging:
    runs-on: ubuntu-latest
    steps:
      - name: Check staging gate
        id: gate
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const labels = pr.labels.map((label) => label.name);
            const allowed =
              !pr.draft &&
              pr.head.ref.startsWith('feature/') &&
              labels.includes('staging');
            core.setOutput('allowed', String(allowed));

      - name: Check out PR head
        if: steps.gate.outputs.allowed == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Configure git identity
        if: steps.gate.outputs.allowed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fast-forward staging branch
        if: steps.gate.outputs.allowed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch origin staging || true
          git push origin HEAD:staging --force-with-lease
